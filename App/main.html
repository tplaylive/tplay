<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T Play - Premium Streaming</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #2563eb;
      --primary-light: #3b82f6;
      --primary-dark: #1d4ed8;
      --dark: #0f172a;
      --darker: #020617;
      --light: #f8fafc;
      --light-gray: #e2e8f0;
      --gray: #94a3b8;
      --dark-gray: #475569;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }
    
    body {
      background-color: var(--darker);
      color: var(--light);
      min-height: 100vh;
    }
    
    /* Video Container */
    .video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background-color: black;
    }
    
    #video-player {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    /* Channel Categories */
    .category-section {
      padding: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .category-title {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
      color: var(--primary-light);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .category-channels {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.5rem;
    }
    
    .channel-card {
      background: var(--dark);
      border-radius: 8px;
      padding: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    
    .channel-card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
    }
    
    .channel-card.active {
      background: rgba(37, 99, 235, 0.2);
      border-color: var(--primary);
    }
    
    .channel-logo {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--darker);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.5rem;
    }
    
    .channel-name {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    /* Mobile Channels Drawer */
    .channels-drawer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: var(--dark);
      z-index: 100;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.3s ease;
    }
    
    .channels-drawer.open {
      transform: translateX(0);
    }
    
    .drawer-header {
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: var(--dark);
      z-index: 10;
    }
    
    .drawer-close-btn {
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="video-container">
    <video id="video-player" playsinline></video>
  </div>
  
  <!-- Channels Drawer -->
  <div class="channels-drawer" id="channels-drawer">
    <div class="drawer-header">
      <h2>All Channels</h2>
      <button class="drawer-close-btn" id="drawer-close-btn">
        <i class="fas fa-times"></i>
      </button>
    </div>
    
    <!-- Movies Category -->
    <div class="category-section">
      <div class="category-title">
        <i class="fas fa-film"></i>
        <span>Movies</span>
      </div>
      <div class="category-channels" id="movies-channels"></div>
    </div>
    
    <!-- Kids Category -->
    <div class="category-section">
      <div class="category-title">
        <i class="fas fa-child"></i>
        <span>Kids</span>
      </div>
      <div class="category-channels" id="kids-channels"></div>
    </div>
    
    <!-- Music Category -->
    <div class="category-section">
      <div class="category-title">
        <i class="fas fa-music"></i>
        <span>Music</span>
      </div>
      <div class="category-channels" id="music-channels"></div>
    </div>
    
    <!-- Religious Category -->
    <div class="category-section">
      <div class="category-title">
        <i class="fas fa-pray"></i>
        <span>Religious</span>
      </div>
      <div class="category-channels" id="religious-channels"></div>
    </div>
  </div>
  
  <script>
    // Organized channels by category
    const channels = {
      movies: [
        { 
          name: "Hindi Movies", 
          url: "https://example.com/hindi.m3u8",
          logo: "M"
        },
        { 
          name: "Bangla Movies", 
          url: "https://example.com/bangla.m3u8",
          logo: "M"
        }
      ],
      kids: [
        { 
          name: "Cartoon Network", 
          url: "https://example.com/cartoon.m3u8",
          logo: "CN"
        },
        { 
          name: "Pogo", 
          url: "https://example.com/pogo.m3u8",
          logo: "P"
        }
      ],
      music: [
        { 
          name: "Bollywood Music", 
          url: "https://example.com/bollywood.m3u8",
          logo: "♫"
        }
      ],
      religious: [
        { 
          name: "Islamic TV", 
          url: "https://example.com/islamic.m3u8",
          logo: "☪"
        }
      ]
    };

    // Render channels by category
    function renderChannels() {
      for (const category in channels) {
        const container = document.getElementById(`${category}-channels`);
        channels[category].forEach(channel => {
          const channelCard = document.createElement('div');
          channelCard.className = 'channel-card';
          channelCard.innerHTML = `
            <div class="channel-logo">${channel.logo}</div>
            <div class="channel-name">${channel.name}</div>
          `;
          channelCard.addEventListener('click', () => {
            playChannel(channel.url);
          });
          container.appendChild(channelCard);
        });
      }
    }

    // Play selected channel
    function playChannel(url) {
      const videoPlayer = document.getElementById('video-player');
      videoPlayer.src = url;
      videoPlayer.play();
    }

    // Initialize
    renderChannels();
  </script>
</body>
</html>
